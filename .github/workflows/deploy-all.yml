name: Deploy All

on:
  push:
    tags:
      - 'release-v*'
  workflow_dispatch:

jobs:
  deploy-cli:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Test CLI
        run: bun run smoke

      - name: Publish CLI to NPM
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-vscode:
    runs-on: ubuntu-latest
    needs: deploy-cli
    defaults:
      run:
        working-directory: ./vscode-extension/claudex-vscode
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install VSCE
        run: npm install -g @vscode/vsce

      - name: Package Extension
        run: vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        run: vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Upload VSIX Artifact
        uses: actions/upload-artifact@v4
        with:
          name: claudex-vscode-extension
          path: 'vscode-extension/claudex-vscode/*.vsix'
